  <style>
    /* TOOLTIP CSS */
    .tooltip {
      position: absolute;
      white-space: nowrap;
      background-color: #09090b;
      color: #fbbf24;
      font-size: 10px;
      font-weight: 700;
      padding: 6px 10px;
      border-radius: 8px;
      border: 1px solid rgba(251,191,36,0.3);
      opacity: 0;
      visibility: hidden;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 999;
      pointer-events: none;
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.8);
      text-transform: none;
      letter-spacing: normal;
    }
    .has-tooltip:hover > .tooltip { opacity: 1; visibility: visible; }
    .tooltip-top { bottom: 100%; left: 50%; transform: translate(-50%, -8px); }
    .has-tooltip:hover > .tooltip-top { transform: translate(-50%, -12px); }
    .tooltip-bottom { top: 100%; left: 50%; transform: translate(-50%, 8px); }
    .has-tooltip:hover > .tooltip-bottom { transform: translate(-50%, 12px); }
    .tooltip-right { left: 100%; top: 50%; transform: translate(8px, -50%); }
    .has-tooltip:hover > .tooltip-right { transform: translate(12px, -50%); }
    .tooltip-left { right: 100%; top: 50%; transform: translate(-8px, -50%); }
    .has-tooltip:hover > .tooltip-left { transform: translate(-12px, -50%); }

    /* SCROLLBAR */
    .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(251,191,36,0.1); border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

    @keyframes fade-in { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    .animate-in { animation: fade-in 0.3s ease-out forwards; }
    
    /* SLIDERS */
    input[type="range"].styled-slider { -webkit-appearance: none; background: rgba(255,255,255,0.1); border-radius: 10px; height: 3px; }
    input[type="range"].styled-slider::-webkit-slider-thumb { -webkit-appearance: none; height: 12px; width: 12px; border-radius: 50%; background: #fff; cursor: pointer; border: 2px solid #09090b; transition: background 0.2s; }
    input[type="range"].styled-slider:active::-webkit-slider-thumb { background: #fbbf24; }
    
    /* HIDE NUMBER INPUT ARROWS */
    input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type="number"] { -moz-appearance: textfield; }

    @keyframes marching-ants {
      to { stroke-dashoffset: -10; }
    }
    .ants-black {
      stroke: #000; stroke-width: 1.5px; stroke-dasharray: 5, 5; animation: marching-ants 0.5s linear infinite; fill: rgba(251,191,36,0.15);
    }
    .ants-white {
      stroke: #fff; stroke-width: 1.5px; stroke-dasharray: 5, 5; stroke-dashoffset: 5; animation: marching-ants 0.5s linear infinite; fill: none;
    }

    /* Split slider specific */
    input[type="range"].split-slider { -webkit-appearance: none; background: transparent; height: 100%; width: 100%; position: absolute; inset: 0; z-index: 50; outline: none; margin: 0; }

    // --- SYSTEME DE REQUETE AVEC BACKOFF (ANTI-CRASH ET ANTI-SPIN) ---
    const fetchWithBackoff = async (url, options = {}, isImage = false) => {
      const delays = [1000, 2000, 4000, 8000, 16000]; // Exponential backoff
      let lastError = null;
      
      for (let i = 0; i <= delays.length; i++) {
        try {
          const controller = new AbortController();
          // Timeout étendu à 45 secondes pour l'image
          const timeoutId = setTimeout(() => controller.abort(), isImage ? 45000 : 15000);
          
          const response = await fetch(url, { ...options, signal: controller.signal });
          clearTimeout(timeoutId);
          
          if (!response.ok) {
            let errMsg = `HTTP_${response.status}`;
            try {
              const errData = await response.json();
              if (errData.error?.message) errMsg = errData.error.message;
            } catch(e) {}
            throw new Error(errMsg);
          }
          
          return response; // Return full response object to parse json cleanly later
        } catch (e) {
          lastError = e;
          const errText = (e.message || "").toLowerCase();
          
          // On n'insiste pas si la clé est bloquée ou si l'argument est invalide
          if (e.name !== 'AbortError' && (errText.includes('api key') || errText.includes('invalid_argument') || errText.includes('not valid') || errText.includes('not found'))) {
            throw e; 
          }
          
          // Sinon, on attend et on réessaie (Backoff)
          if (i < delays.length) {
            await new Promise(r => setTimeout(r, delays[i]));
          }
        }

      throw lastError; // Si toutes les tentatives échouent, on balance l'erreur
    };

    const App = () => {
      const [lang, setLang] = useState('en');
      const [activeTab, setActiveTab] = useState('settings'); 
      const [apiKey, setApiKey] = useState("");
      const [showKey, setShowKey] = useState(false);
      const [apiStatus, setApiStatus] = useState('untested');
      
      const [images, setImages] = useState([]);
      const [selectedImageIndex, setSelectedImageIndex] = useState(null);
      const [historyLogs, setHistoryLogs] = useState([]); 
      
      const [status, setStatus] = useState('idle');
      const [statusMessage, setStatusMessage] = useState("");
      const [imageResult, setImageResult] = useState(null);
      const [promptResult, setPromptResult] = useState("");
      const [instruction, setInstruction] = useState("");
      const [enableOutpainting, setEnableOutpainting] = useState(false); 
      const [styleRefIndex, setStyleRefIndex] = useState(null); 
      
      const [isConsoleExpanded, setIsConsoleExpanded] = useState(true); 
      const [zoomMenuOpen, setZoomMenuOpen] = useState(false);
      const [selectMenuOpen, setSelectMenuOpen] = useState(false);
      const [toolbarPos, setToolbarPos] = useState({ x: 24, y: 100 });
      const [isDraggingToolbar, setIsDraggingToolbar] = useState(false);
      const toolbarRef = useRef(null);
      const dragOffset = useRef({ x: 0, y: 0 });
      const [isSplitMode, setIsSplitMode] = useState(false);
      const [splitPosition, setSplitPosition] = useState(50);
      const [canvasHistory, setCanvasHistory] = useState([]);
      const [toastMsg, setToastMsg] = useState("");
      const [presets, setPresets] = useState([]);
      
      // NOUVEAUX ÉTATS POUR LA POP-UP MODAL (Rendu Image)
      const [showModal, setShowModal] = useState(false);
      const [modalImage, setModalImage] = useState(null);
      
      // AUTO-DETECT MODEL SCANNER STATE
      const [availableModels, setAvailableModels] = useState([]);
      const [selectedModel, setSelectedModel] = useState('gemini-1.5-flash');
      
      const [enhancers, setEnhancers] = useState({ upscale: false, raw: false, face: false, isolate: false });
      const [matrixSelection, setMatrixSelection] = useState({ camera: "", lighting: "", mood: "", artist: "", render: "", film: "" });
      const [advancedParams, setAdvancedParams] = useState({ temp: 0.7, topP: 0.9, safety: 'std', dailyBudget: 500000, callsMin: 10, callsHour: 60 });
      
      const [sidebarWidth, setSidebarWidth] = useState(288);
      const [isResizingSidebar, setIsResizingSidebar] = useState(false);
      const [zoom, setZoom] = useState(1);
      const [toolMode, setToolMode] = useState('brush'); 
      const [isSpaceDown, setIsSpaceDown] = useState(false);
      const [panOffset, setPanOffset] = useState({ x: 0, y: 0 });
      const [brushOpacity, setBrushOpacity] = useState(0.5);
      const [brushSize, setBrushSize] = useState(35);
      const [brushSoftness, setBrushSoftness] = useState(0);
      const [brushColor, setBrushColor] = useState(BRUSH_COLORS[0]);
      const [activeAction, setActiveAction] = useState(null);
      const [activeRatio, setActiveRatio] = useState(RATIOS[0]);
      const [ratioMenuOpen, setRatioMenuOpen] = useState(false); 
      
      const [cursorPos, setCursorPos] = useState({ x: 0, y: 0 });
      const [isMouseDown, setIsMouseDown] = useState(false);
      
      // NOUVEAUX ÉTATS POUR LES COMPTEURS
      const [tokensUsed, setTokensUsed] = useState(0);
      const [imagesGenerated, setImagesGenerated] = useState(0);
      
      const [isDragging, setIsDragging] = useState(false);
      const [isGlobalDragging, setIsGlobalDragging] = useState(false);
      
      const [modifiers, setModifiers] = useState({ shift: false, alt: false, ctrl: false });
      const activeModifiersRef = useRef({ shift: false, alt: false, ctrl: false });
      const [isAdjustingBrush, setIsAdjustingBrush] = useState(false);
      const selectionModeRef = useRef('add');

      const [selectionStart, setSelectionStart] = useState(null);
      const [selectionCurrent, setSelectionCurrent] = useState(null);
      const selectionPointsRef = useRef([]);
      const currentStrokeRef = useRef([]);
      const overlayCanvasRef = useRef(null);
      const [canvasRes, setCanvasRes] = useState({w: 1024, h: 1024});

      useEffect(() => {
          const [w, h] = activeRatio.id.split(':').map(Number);
          if (w > h) {
              setCanvasRes({ w: 1024, h: Math.round(1024 * (h/w)) });
          } else {
              setCanvasRes({ w: Math.round(1024 * (w/h)), h: 1024 });
          }
      }, [activeRatio]);

      const canvasRef = useRef(null);
      const containerRef = useRef(null);
      const lastMousePos = useRef({ x: 0, y: 0 });
      const t = TRANSLATIONS[lang];
      const [currentTip, setCurrentTip] = useState(0);

      // Translation Reciprocity Hook - SAFE SPLIT & JOIN INSTEAD OF REGEX
      useEffect(() => {
        let newInst = instruction;
        const sourceLang = lang === 'fr' ? 'en' : 'fr';
        const targetLang = lang;

        QUICK_TAGS[sourceLang].forEach((tag, idx) => {
          if (newInst.includes(tag)) {
            newInst = newInst.split(tag).join(QUICK_TAGS[targetLang][idx]);
          }
        });
        
        CATEGORIES.forEach(cat => {
          cat.options[sourceLang].forEach((opt, idx) => {
            if (newInst.includes(opt)) {
              newInst = newInst.split(opt).join(cat.options[targetLang][idx]);
            }
          });
        });
        
        if (newInst !== instruction) {
           setInstruction(newInst);
        }
      }, [lang]);

      // --- Util / Toast ---
      const showToast = (msg) => {
        setToastMsg(msg);
        setTimeout(() => setToastMsg(""), 4000);
      };

      // INIT API KEY FROM LOCAL STORAGE
      useEffect(() => {
        const savedKey = localStorage.getItem('banana_api_key');
        if (savedKey) setApiKey(savedKey);
      }, []);

      const checkApiKey = () => {
        const cleanKey = apiKey.trim();
        if (!cleanKey) {
          showToast(lang === 'fr' ? "CLÉ API REQUISE" : "API KEY REQUIRED");
          setApiStatus('error');
          setActiveTab('settings');
          return false;
        }
        localStorage.setItem('banana_api_key', cleanKey);
        return cleanKey;
      };

      useEffect(() => {
        const saved = localStorage.getItem('banana_presets');
        if(saved) setPresets(JSON.parse(saved));
      }, []);

      useEffect(() => {
        const timer = setInterval(() => setCurrentTip(p => (p + 1) % t.tips.length), 8000);
        return () => clearInterval(timer);
      }, [t.tips.length]);

      useEffect(() => {
        const container = containerRef.current;
        if (!container) return;
        const handleWheelZoom = (e) => {
          e.preventDefault();
          const zoomFactor = 0.15;
          const direction = e.deltaY > 0 ? -1 : 1;
          setZoom(prev => Math.min(Math.max(prev + direction * zoomFactor, 0.3), 8));
        };
        container.addEventListener('wheel', handleWheelZoom, { passive: false });
        return () => container.removeEventListener('wheel', handleWheelZoom);
      }, [activeTab]);

      // --- KEYBOARD MODIFIERS LISTENER ---
      const updateModifiersFromEvent = (e) => {
        const shift = e.shiftKey; 
        const alt = e.altKey; 
        const ctrl = e.ctrlKey || e.metaKey;
        activeModifiersRef.current = { shift, alt, ctrl };
        setModifiers(prev => {
           if (prev.shift !== shift || prev.alt !== alt || prev.ctrl !== ctrl) {
               return { shift, alt, ctrl };
           }
           return prev;
        });
      };

      useEffect(() => {
        window.addEventListener('keydown', updateModifiersFromEvent);
        window.addEventListener('keyup', updateModifiersFromEvent);
        window.addEventListener('mousemove', updateModifiersFromEvent);
        return () => {
          window.removeEventListener('keydown', updateModifiersFromEvent);
          window.removeEventListener('keyup', updateModifiersFromEvent);
          window.removeEventListener('mousemove', updateModifiersFromEvent);
        };
      }, []);

      // --- KEYBOARD SHORTCUTS PRO ---
      useEffect(() => {
        const handleKeyDown = (e) => {
          const activeTag = document.activeElement?.tagName;
          if (['TEXTAREA', 'INPUT', 'SELECT'].includes(activeTag)) return; 

          if (e.code === 'Space') { e.preventDefault(); setIsSpaceDown(true); }
          if (e.key === '-' || e.key === '_') setBrushSize(p => Math.max(5, p - 5));
          if (e.key === '+' || e.key === '=') setBrushSize(p => Math.min(150, p + 5));
          if (e.key.toLowerCase() === 'b') setToolMode('brush');
          if (e.key.toLowerCase() === 'e') setToolMode('eraser');
          if (e.key.toLowerCase() === 'h') setToolMode('pan');
          if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z') { e.preventDefault(); handleUndo(); }
          if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 's') { e.preventDefault(); if (imageResult) saveImageWithMeta(imageResult); }
        };
        const handleKeyUp = (e) => { 
          if (e.code === 'Space') setIsSpaceDown(false); 
        };
        
        window.addEventListener('keydown', handleKeyDown);
        window.addEventListener('keyup', handleKeyUp);
        return () => { window.removeEventListener('keydown', handleKeyDown); window.removeEventListener('keyup', handleKeyUp); };
      }, [imageResult, activeTab]);

      useEffect(() => {
        if (!isResizingSidebar) return;
        const handleMouseMove = (e) => {
          let newWidth = e.clientX - 80;
          if (newWidth < 240) newWidth = 240;
          if (newWidth > 600) newWidth = 600;
          setSidebarWidth(newWidth);
        };
        const handleMouseUp = () => setIsResizingSidebar(false);
        document.addEventListener('mousemove', handleMouseMove);
        document.addEventListener('mouseup', handleMouseUp);
        return () => { document.removeEventListener('mousemove', handleMouseMove); document.removeEventListener('mouseup', handleMouseUp); };
      }, [isResizingSidebar]);

      // --- LOGIQUE MAGNÉTIQUE DE LA PALETTE D'OUTILS ---
      useEffect(() => {
        if (!isDraggingToolbar) return;
        const handleMouseMove = (e) => {
          if (!containerRef.current) return;
          const containerRect = containerRef.current.getBoundingClientRect();
          let newX = e.clientX - containerRect.left - dragOffset.current.x;
          let newY = e.clientY - containerRect.top - dragOffset.current.y;
          setToolbarPos({ x: newX, y: newY });
        };
        const handleMouseUp = (e) => {
          setIsDraggingToolbar(false);
          if (!toolbarRef.current || !containerRef.current) return;
          const toolbarRect = toolbarRef.current.getBoundingClientRect();
          const containerRect = containerRef.current.getBoundingClientRect();
          const margin = 24;
          
          let newX = e.clientX - containerRect.left - dragOffset.current.x;
          let newY = e.clientY - containerRect.top - dragOffset.current.y;
          
          if (newX < 100) newX = margin;
          else if (newX > containerRect.width - toolbarRect.width - 100) newX = containerRect.width - toolbarRect.width - margin;
          
          if (newY < 40) newY = margin;
          else if (newY > containerRect.height - toolbarRect.height - 40) newY = containerRect.height - toolbarRect.height - margin;
          
          setToolbarPos({ x: newX, y: newY });
        };
        document.addEventListener('mousemove', handleMouseMove);
        document.addEventListener('mouseup', handleMouseUp);
        return () => {
          document.removeEventListener('mousemove', handleMouseMove);
          document.removeEventListener('mouseup', handleMouseUp);
        };
      }, [isDraggingToolbar]);

      const handleToolbarMouseDown = (e) => {
        setIsDraggingToolbar(true);
        const rect = toolbarRef.current.getBoundingClientRect();
        dragOffset.current = { x: e.clientX - rect.left, y: e.clientY - rect.top };
      };

      const clearCanvas = () => {
        if (canvasRef.current) {
          const ctx = canvasRef.current.getContext('2d');
          ctx.clearRect(0, 0, canvasRef.current.width, canvasRef.current.height);
          setCanvasHistory([]);
        }
      };

      const handleReset = () => {
        setImages([]); setSelectedImageIndex(null); setImageResult(null); setInstruction("");
        setPromptResult(""); setActiveAction(null); setStatus('idle'); setPanOffset({ x: 0, y: 0 }); setZoom(1);
        setStyleRefIndex(null); setEnableOutpainting(false); setEnhancers({ upscale: false, raw: false, face: false, isolate: false });
        setIsSplitMode(false);
        setActiveTab('assets');
        clearCanvas();
        showToast(lang === 'fr' ? "ESPACE RÉINITIALISÉ" : "WORKSPACE CLEARED");
      };

      // FIX : On réinitialise l'image de Style (B) si on change l'image principale (A) pour éviter les conflits
      useEffect(() => { clearCanvas(); setIsSplitMode(false); setStyleRefIndex(null); }, [selectedImageIndex]);

      const saveCanvasState = () => {
        if (canvasRef.current) {
          setCanvasHistory(prev => [...prev, canvasRef.current.toDataURL()]);
        }
      };

      const handleUndo = () => {
        setCanvasHistory(prev => {
          if (prev.length === 0) { clearCanvas(); return prev; }
          const newHistory = [...prev];
          newHistory.pop(); 
          const lastState = newHistory[newHistory.length - 1];
          const ctx = canvasRef.current.getContext('2d');
          ctx.clearRect(0, 0, canvasRef.current.width, canvasRef.current.height);
          if (lastState) {
            const img = new Image();
            img.onload = () => { ctx.globalCompositeOperation = 'source-over'; ctx.globalAlpha = 1; ctx.drawImage(img, 0, 0); };
            img.src = lastState;
          }
          return newHistory;
        });
      };

      // --- AUTO-DETECT MODEL SCANNER ---
      const testApiConnection = async () => {
        const cleanKey = checkApiKey();
        if (!cleanKey) return;
        setApiStatus('testing');
        setStatusMessage("FETCHING MODELS LIST...");
        
        try {
          const response = await fetchWithBackoff(`https://generativelanguage.googleapis.com/v1beta/models?key=${cleanKey}`);
          const data = await response.json();
          
          // On filtre pour ne garder que les modèles Gemini qui savent générer du contenu
          let validModels = data.models
              .filter(m => m.name.startsWith('models/gemini') && m.supportedGenerationMethods.includes('generateContent'))
              .map(m => m.name.replace('models/', ''));

          // On exclut les modèles "pro" pour économiser les crédits (sauf si on a QUE des modèles pro)
          const nonProModels = validModels.filter(m => !m.includes('pro'));
          if (nonProModels.length > 0) {
              validModels = nonProModels;
          }

          if (validModels.length > 0) {
              setAvailableModels(validModels);
              // On privilégie le modèle le plus performant et moins gourmand en priorité absolue
              const preferred = validModels.find(m => m === 'gemini-1.5-flash') 
                             || validModels.find(m => m.includes('1.5-flash-8b'))
                             || validModels.find(m => m.includes('flash')) 
                             || validModels[0];
              setSelectedModel(preferred);
              setApiStatus('success'); 
              setStatusMessage(`${validModels.length} MODELS FOUND`);
          } else {
              setApiStatus('error'); 
              setStatusMessage("NO COMPATIBLE MODELS FOUND");
          }
        } catch (e) {
          const errText = (e.message || "").toLowerCase();
          setApiStatus('error'); 
          setStatusMessage(errText ? errText.substring(0, 35).toUpperCase() : "NETWORK TIMEOUT");
        }
      };

      const analyzeDNA = async () => {
        const selectedImg = selectedImageIndex !== null ? images[selectedImageIndex] : images[0];
        if (!selectedImg) { showToast("Image required!"); return; }
        const cleanKey = checkApiKey();
        if (!cleanKey) return;
        
        setStatus('processing');
        setStatusMessage("ANALYZING IMAGE DNA...");

        const promptText = `You are a professional Art Director. Analyze this image deeply. Output a raw JSON object EXACTLY matching this structure with no markdown or formatting around it: {"instruction": "Detailed visual description of the main subject and action", "camera": "Guess closest from 35mm Prime, 85mm Portrait, Drone Aerial View, etc.", "lighting": "Guess closest from Cinematic Lighting, Golden Hour, Neon Glow, etc.", "mood": "Guess mood", "artist": "Guess a known artist style", "render": "Guess render engine", "film": "Guess film stock"}. Ensure it's 100% valid JSON.`;

        try {
          const url = `https://generativelanguage.googleapis.com/v1beta/models/${selectedModel}:generateContent?key=${cleanKey}`;
          const response = await fetchWithBackoff(url, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{ parts: [{ text: promptText }, { inlineData: { mimeType: "image/jpeg", data: selectedImg.base64 } }] }],
              generationConfig: { temperature: 0.2 }
            })
          });

          const result = await response.json();
          setTokensUsed(prev => prev + 350); // Approximated tokens used for analysis
          
          const rawText = result.candidates?.[0]?.content?.parts?.[0]?.text || "";
          const jsonMatch = rawText.match(/\{[\s\S]*\}/);
          if (jsonMatch) {
            const dna = JSON.parse(jsonMatch[0]);
            if(dna.instruction) setInstruction(dna.instruction);
            setMatrixSelection({
              camera: dna.camera || "", lighting: dna.lighting || "", mood: dna.mood || "", 
              artist: dna.artist || "", render: dna.render || "", film: dna.film || ""
            });
            showToast(lang === 'fr' ? "ADN EXTRAIT AVEC SUCCÈS" : "DNA EXTRACTED SUCCESSFULLY");
          } else {
            throw new Error("Failed to parse JSON");
          }
          setStatus('idle');
        } catch(e) {
          setStatus('error'); setStatusMessage("DNA ANALYSIS FAILED"); setTimeout(()=>setStatus('idle'),3000);
        }
      };

      const autoMaskSubject = async () => {
        const selectedImg = selectedImageIndex !== null ? images[selectedImageIndex] : images[0];
        if (!selectedImg) { showToast("Image required!"); return; }
        const cleanKey = checkApiKey();
        if (!cleanKey) return;
        
        setStatus('processing');
        setStatusMessage("AI SUBJECT ISOLATION...");

        const promptText = `Find the main prominent subject in this image. Return its bounding box as a simple JSON array of 4 numbers [ymin, xmin, ymax, xmax], scaled from 0 to 1000. Do not include any text, just the JSON array. Example: [200, 300, 800, 700]`;

        try {
          const url = `https://generativelanguage.googleapis.com/v1beta/models/${selectedModel}:generateContent?key=${cleanKey}`;
          const response = await fetchWithBackoff(url, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{ parts: [{ text: promptText }, { inlineData: { mimeType: "image/jpeg", data: selectedImg.base64 } }] }],
              generationConfig: { temperature: 0.1 }
            })
          });

          const result = await response.json();
          setTokensUsed(prev => prev + 250); // Approximated tokens
          
          const rawText = result.candidates?.[0]?.content?.parts?.[0]?.text || "";
          const arrMatch = rawText.match(/\[(.*?)\]/);
          if (arrMatch) {
            const [ymin, xmin, ymax, xmax] = JSON.parse(arrMatch[0]);
            if (canvasRef.current) {
              const ctx = canvasRef.current.getContext('2d');
              const cw = canvasRef.current.width; const ch = canvasRef.current.height;
              const x = (xmin / 1000) * cw; const y = (ymin / 1000) * ch;
              const w = ((xmax - xmin) / 1000) * cw; const h = ((ymax - ymin) / 1000) * ch;
              
              saveCanvasState(); 
              ctx.globalCompositeOperation = 'source-over';
              ctx.fillStyle = brushColor.value;
              ctx.globalAlpha = brushOpacity;
              ctx.fillRect(x, y, w, h);
              showToast(lang === 'fr' ? "SUJET MASQUÉ" : "SUBJECT MASKED");
            }
          }
          setStatus('idle');
        } catch(e) {
          setStatus('error'); setStatusMessage("AUTO-MASK FAILED"); setTimeout(()=>setStatus('idle'),3000);
        }
      };

      const runAction = async (mode = 'edit') => {
        const selectedImg = selectedImageIndex !== null ? images[selectedImageIndex] : images[0];
        if (!selectedImg) { setStatusMessage(lang === 'fr' ? "Image source requise." : "Image source required."); setStatus('error'); setTimeout(() => setStatus('idle'), 3000); return; }
        const cleanKey = checkApiKey();
        if (!cleanKey) return;

        setStatus('processing');
        setStatusMessage("PROCESSING DATA...");

        const matrixStr = Object.entries(matrixSelection).filter(([_,v]) => v !== "").map(([k,v]) => `${k}: ${v}`).join(", ");
        const outpaintStr = enableOutpainting ? "Perform outpainting. Fill aspect ratio gaps seamlessly." : "";
        let enhStr = "";
        if (enhancers.upscale) enhStr += " 8K high resolution masterpiece details. ";
        if (enhancers.raw) enhStr += " RAW photorealistic DSLR look. ";
        if (enhancers.face) enhStr += " Preserve exact facial identity. ";
        if (enhancers.isolate) enhStr += " Isolate subject on studio background. ";

        const fullPrompt = `[BANANA ENGINE] Directive: ${instruction}. Context: ${activeAction || 'Edit'}. Matrix: ${matrixStr}. Ratio: ${activeRatio.id}. ${outpaintStr} ${enhStr}`;

        // 1. MODE PROMPT (Génération de Texte - utilise le modèle "flash" scanné)
        if (mode === 'prompt') {
          try {
            const partsArray = [
              { text: fullPrompt },
              { inlineData: { mimeType: "image/jpeg", data: selectedImg.base64 } }
            ];
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${selectedModel}:generateContent?key=${cleanKey}`;
            
            const response = await fetchWithBackoff(url, {
              method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                contents: [{ parts: partsArray }],
                generationConfig: { temperature: advancedParams.temp, topP: advancedParams.topP }
              })
            });

            const result = await response.json();
            setPromptResult(result.candidates?.[0]?.content?.parts?.[0]?.text || "Error");
            setTokensUsed(prev => prev + 400); // Tokens for prompt build
            setActiveTab('studio');
            setIsConsoleExpanded(true);
            setStatus('success'); setTimeout(() => setStatus('idle'), 2000);
          } catch (e) {
            setStatus('error'); setStatusMessage("PROMPT FAILED"); setTimeout(() => setStatus('idle'), 3000);
          }
          return;
        }

        // 2. MODE EDIT (Édition exclusive via Nano Banana - 2.5-flash-image-preview)
        try {
          const partsArray = [
            { text: fullPrompt + " Mode: edit." },
            { inlineData: { mimeType: "image/jpeg", data: selectedImg.base64 } }
          ];
          if (styleRefIndex !== null && images[styleRefIndex]) {
            partsArray.push({ text: "Apply STYLE from this image:" }, { inlineData: { mimeType: "image/jpeg", data: images[styleRefIndex].base64 } });
          }

          const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image-preview:generateContent?key=${cleanKey}`;
          
          // isImage = true -> Extended timeout (45s) for heavy processing
          const response = await fetchWithBackoff(url, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{ parts: partsArray }],
              generationConfig: { responseModalities: ['TEXT', 'IMAGE'] }
            })
          }, true);

          const result = await response.json();
          const b64 = result.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
          
          if (b64) {
            const finalImageUrl = `data:image/png;base64,${b64}`;
            setTokensUsed(prev => prev + 1800);
            setImagesGenerated(prev => prev + 1);
            
            setModalImage(finalImageUrl);
            setShowModal(true); // Ouvre la popup !
            setHistoryLogs(prev => [{ id: Date.now(), url: finalImageUrl, prompt: instruction || activeAction || "Edit", time: new Date().toLocaleTimeString() }, ...prev]);
            
            setStatus('success'); setTimeout(() => setStatus('idle'), 2000);
          } else {
            throw new Error("NO_IMAGE_RETURNED");
          }
        } catch (e) {
          setStatus('error');
          console.error("RunAction Error:", e);
          let msg = "CONNECTION FAILED";
          
          // Protection contre le crash e.message.toLowerCase()
          const errText = (e.message || "").toLowerCase();
          
          if (errText.includes("api key not valid") || errText.includes("invalid key")) msg = "INVALID API KEY";
          else if (errText.includes("modalities") || errText.includes("image")) msg = "MODEL CANNOT OUTPUT IMAGES";
          else if (e.name === 'AbortError') msg = "REQUEST TIMEOUT";
          else msg = (e.message || "UNKNOWN ERROR").substring(0, 40).toUpperCase();
          
          setStatusMessage(msg); setTimeout(() => setStatus('idle'), 6000);
        }
      };

      const saveImageWithMeta = async (targetImageUrl = imageResult) => {
        if (!targetImageUrl) return;
        const metaObj = { instruction, matrixSelection, enhancers, activeRatio: activeRatio.id };
        const metaStr = `BANANA_META_START${JSON.stringify(metaObj)}BANANA_META_END`;
        
        try {
          const res = await fetch(targetImageUrl);
          const blob = await res.blob();
          const arrayBuffer = await blob.arrayBuffer();
          
          const encoder = new TextEncoder();
          const metaBuffer = encoder.encode(metaStr);
          
          const combined = new Uint8Array(arrayBuffer.byteLength + metaBuffer.byteLength);
          combined.set(new Uint8Array(arrayBuffer), 0);
          combined.set(metaBuffer, arrayBuffer.byteLength);
          
          const finalBlob = new Blob([combined], { type: 'image/png' });
          const url = URL.createObjectURL(finalBlob);
          
          const a = document.createElement('a');
          a.href = url;
          a.download = `banana-elite-${Date.now()}.png`;
          a.click();
          URL.revokeObjectURL(url);
          showToast(lang === 'fr' ? "SAUVEGARDÉ AVEC MÉTA" : "SAVED WITH METADATA");
        } catch (err) {
          console.error("Save error:", err);
        }
      };

      const handleImageExtraction = async (file) => {
        try {
          const text = await file.text();
          const startIdx = text.indexOf('BANANA_META_START');
          const endIdx = text.indexOf('BANANA_META_END');
          if (startIdx !== -1 && endIdx !== -1) {
            const jsonStr = text.substring(startIdx + 17, endIdx);
            const meta = JSON.parse(jsonStr);
            if (meta.instruction) setInstruction(meta.instruction);
            if (meta.matrixSelection) setMatrixSelection(meta.matrixSelection);
            if (meta.enhancers) setEnhancers(meta.enhancers);
            if (meta.activeRatio) {
              const ratio = RATIOS.find(r => r.id === meta.activeRatio);
              if(ratio) setActiveRatio(ratio);
            }
            showToast(lang === 'fr' ? "RÉGLAGES RESTAURÉS DEPUIS L'IMAGE !" : "SETTINGS RESTORED FROM IMAGE!");
            setIsConsoleExpanded(true);
          }
        } catch(e) { console.log("No metadata found"); }
      };

      const compressAndExtract = (file) => {
        handleImageExtraction(file); 
        return new Promise((resolve) => {
          const reader = new FileReader();
          reader.readAsDataURL(file);
          reader.onload = (event) => {
            const img = new Image();
            img.src = event.target.result;
            img.onload = () => {
              const canvas = document.createElement('canvas');
              const MAX = 1024;
              let w = img.width, h = img.height;
              if (w > h) { if (w > MAX) { h *= MAX/w; w = MAX; } }
              else { if (h > MAX) { w *= MAX/h; h = MAX; } }
              canvas.width = w; canvas.height = h;
              const ctx = canvas.getContext('2d');
              ctx.drawImage(img, 0, 0, w, h);
              
              let quality = 0.8;
              let dataUrl = canvas.toDataURL('image/jpeg', quality);
              
              // SÉCURITÉ ABSOLUE : Si l'image encodée en base64 dépasse ~512 Ko (environ 682 666 caractères)
              while (dataUrl.length > 682666 && quality > 0.1) {
                quality -= 0.1;
                dataUrl = canvas.toDataURL('image/jpeg', quality);
              }
              
              resolve({ url: dataUrl, base64: dataUrl.split(',')[1] });
            };
          };
        });
      };

      const onDrop = async (e) => {
        e.preventDefault(); setIsDragging(false); setIsGlobalDragging(false);
        const fileList = e.dataTransfer?.files || e.target?.files;
        if (!fileList) return;
        
        const files = Array.from(fileList);
        let currentImages = [...images];
        
        for (const file of files) {
          if (!file.type.startsWith('image/')) continue;
          
          const duplicateIndex = currentImages.findIndex(img => img.name === file.name && img.size === file.size);
          if (duplicateIndex !== -1) {
              setSelectedImageIndex(duplicateIndex);
              showToast(lang === 'fr' ? "IMAGE DÉJÀ IMPORTÉE" : "IMAGE ALREADY IMPORTED");
              continue;
          }

          const opt = await compressAndExtract(file);
          currentImages.push({ id: Math.random().toString(36).substr(2, 9), ...opt, name: file.name, size: file.size });
        }
        
        if (currentImages.length > images.length) {
            setImages(currentImages);
            setSelectedImageIndex(currentImages.length - 1);
        }
      };

      const effectiveTool = isSpaceDown ? 'pan' : toolMode;

      const drawOverlay = () => {
          const overlay = overlayCanvasRef.current;
          if (!overlay) return;
          const octx = overlay.getContext('2d');
          octx.clearRect(0, 0, overlay.width, overlay.height);
          if (currentStrokeRef.current.length === 0) return;

          const canvasRect = overlay.getBoundingClientRect();
          const scaleX = overlay.width / canvasRect.width;
          
          const mods = activeModifiersRef.current;
          let isSubtract = effectiveTool === 'eraser';
          if (mods.alt) isSubtract = true;
          if (mods.shift) isSubtract = false;

          octx.lineCap = 'round';
          octx.lineJoin = 'round';
          octx.lineWidth = (brushSize / zoom) * scaleX; 
          
          if (!isSubtract && brushSoftness > 0) {
              octx.shadowBlur = (brushSoftness / zoom) * scaleX;
              octx.shadowColor = brushColor.value;
          } else {
              octx.shadowBlur = 0;
          }
          octx.strokeStyle = isSubtract ? 'rgba(255,255,255,0.8)' : brushColor.value;

          octx.beginPath();
          currentStrokeRef.current.forEach((p, i) => {
              if (i === 0) octx.moveTo(p.x, p.y);
              else octx.lineTo(p.x, p.y);
          });
          octx.stroke();
      };

      const handleMouseDown = (e) => {
        updateModifiersFromEvent(e);
        const isAlt = e.altKey;
        const isCtrl = e.ctrlKey || e.metaKey;
        const isShift = e.shiftKey;

        if (isAlt && isCtrl) e.preventDefault();
        
        setIsMouseDown(true);
        lastMousePos.current = { x: e.clientX, y: e.clientY };
        
        const canvasRect = canvasRef.current.getBoundingClientRect();
        const scaleX = canvasRef.current.width / canvasRect.width;
        const scaleY = canvasRef.current.height / canvasRect.height;
        const x = (e.clientX - canvasRect.left) * scaleX;
        const y = (e.clientY - canvasRect.top) * scaleY;

        if (isAlt && isCtrl && (effectiveTool === 'brush' || effectiveTool === 'eraser')) {
            setIsAdjustingBrush(true);
            return;
        }

        if (effectiveTool === 'brush' || effectiveTool === 'eraser') {
          saveCanvasState(); 
          currentStrokeRef.current = [{x, y}];
          drawOverlay();
        } else if (effectiveTool.startsWith('select-')) {
          selectionModeRef.current = isAlt ? 'subtract' : 'add';
          setSelectionStart({x, y});
          setSelectionCurrent({x, y});
          selectionPointsRef.current = [{x, y}];
        }
      };

      const handleMouseMove = (e) => {
        updateModifiersFromEvent(e);
        if (containerRef.current) {
          const rect = containerRef.current.getBoundingClientRect();
          setCursorPos({ x: e.clientX - rect.left, y: e.clientY - rect.top });
        }
        if (!isMouseDown) return;
        const dx = e.clientX - lastMousePos.current.x;
        const dy = e.clientY - lastMousePos.current.y;
        lastMousePos.current = { x: e.clientX, y: e.clientY };
        
        if (isAdjustingBrush) {
            setBrushSize(prev => Math.max(5, Math.min(500, prev + dx * 0.5)));
            setBrushSoftness(prev => Math.max(0, Math.min(100, prev - dy * 0.5)));
            return;
        }

        if (effectiveTool === 'pan') {
          setPanOffset(prev => ({ x: prev.x + dx, y: prev.y + dy }));
          return;
        }

        if (!canvasRef.current) return;
        const canvasRect = canvasRef.current.getBoundingClientRect();
        const scaleX = canvasRef.current.width / canvasRect.width;
        const scaleY = canvasRef.current.height / canvasRect.height;
        const x = (e.clientX - canvasRect.left) * scaleX;
        const y = (e.clientY - canvasRect.top) * scaleY;

        if (effectiveTool === 'brush' || effectiveTool === 'eraser') {
          currentStrokeRef.current.push({x, y});
          drawOverlay();
        } else if (effectiveTool.startsWith('select-')) {
          setSelectionCurrent({x, y});
          if (effectiveTool === 'select-lasso') {
            selectionPointsRef.current.push({x, y});
          }
        }
      };

      const handleMouseUp = (e) => {
        if (e) updateModifiersFromEvent(e);
        setIsMouseDown(false);
        if (isAdjustingBrush) {
            setIsAdjustingBrush(false);
            return;
        }

        if (effectiveTool === 'brush' || effectiveTool === 'eraser') {
          if (currentStrokeRef.current.length > 0 && canvasRef.current && overlayCanvasRef.current) {
            const ctx = canvasRef.current.getContext('2d');
            const mods = activeModifiersRef.current;
            let isSubtract = effectiveTool === 'eraser';
            if (mods.alt) isSubtract = true;
            if (mods.shift) isSubtract = false;

            ctx.globalCompositeOperation = isSubtract ? 'destination-out' : 'source-over';
            ctx.globalAlpha = isSubtract ? 1 : brushOpacity;
            ctx.drawImage(overlayCanvasRef.current, 0, 0);
            
            const octx = overlayCanvasRef.current.getContext('2d');
            octx.clearRect(0, 0, overlayCanvasRef.current.width, overlayCanvasRef.current.height);
            currentStrokeRef.current = [];
          }
        } else if (effectiveTool.startsWith('select-') && selectionStart && selectionCurrent) {
          saveCanvasState();
          const ctx = canvasRef.current.getContext('2d');
          
          const isSubtract = selectionModeRef.current === 'subtract';
          ctx.globalCompositeOperation = isSubtract ? 'destination-out' : 'source-over';
          ctx.globalAlpha = isSubtract ? 1 : brushOpacity;
          ctx.fillStyle = isSubtract ? 'rgba(0,0,0,1)' : brushColor.value;
          ctx.beginPath();

          if (effectiveTool === 'select-rect') {
              const x = Math.min(selectionStart.x, selectionCurrent.x);
              const y = Math.min(selectionStart.y, selectionCurrent.y);
              const w = Math.abs(selectionCurrent.x - selectionStart.x);
              const h = Math.abs(selectionCurrent.y - selectionStart.y);
              ctx.rect(x, y, w, h);
          } else if (effectiveTool === 'select-ellipse') {
              const x = Math.min(selectionStart.x, selectionCurrent.x);
              const y = Math.min(selectionStart.y, selectionCurrent.y);
              const w = Math.abs(selectionCurrent.x - selectionStart.x);
              const h = Math.abs(selectionCurrent.y - selectionStart.y);
              ctx.ellipse(x + w/2, y + h/2, w/2, h/2, 0, 0, 2 * Math.PI);
          } else if (effectiveTool === 'select-lasso') {
              selectionPointsRef.current.forEach((p, i) => {
                  if (i === 0) ctx.moveTo(p.x, p.y);
                  else ctx.lineTo(p.x, p.y);
              });
              ctx.closePath();
          }
          ctx.fill();

          setSelectionStart(null);
          setSelectionCurrent(null);
          selectionPointsRef.current = [];
        }
      };

      const SidebarTab = ({ id, icon, label, tooltipKey }) => (

            <div className="flex items-center gap-2"><i className="ph ph-info text-base"></i> {toastMsg}</div>

                <div>
                  <h1 className="text-[13px] font-black tracking-widest leading-none text-white">{t.title} <span className="text-amber-400 font-light italic">ELITE</span></h1>

              <div className="flex items-center gap-5 text-[10px] font-medium text-slate-500 tracking-wider">
                 <div className="flex items-center gap-2"><i className="ph ph-cloud"></i> <span>EU-SERVER-1</span></div>
                 <div className="flex items-center gap-2">
                   <i className={`ph ph-shield-check ${apiStatus === 'success' ? 'text-emerald-500' : apiStatus === 'error' ? 'text-red-500' : 'text-slate-600'}`}></i> 
                   <span>{apiStatus === 'success' ? 'SECURE' : apiStatus === 'error' ? 'ERROR' : 'OFFLINE'}</span>
                 </div>
              </div>
            </div>
            
            <div className="flex items-center gap-4">
              {/* NEW METRICS BADGE */}
              <div className="flex items-center gap-3 bg-black/40 px-3 py-1.5 rounded-lg border border-white/5 text-[9px] font-mono font-bold tracking-widest text-slate-400">

              {imageResult && (
                <div className="absolute top-6 left-1/2 -translate-x-1/2 z-40">
                  <button onClick={() => setIsSplitMode(!isSplitMode)} className={`has-tooltip px-6 py-2.5 rounded-full font-bold text-[10px] uppercase tracking-widest border transition-all flex items-center gap-2 ${isSplitMode ? 'bg-amber-400 text-black border-amber-400 shadow-[0_0_15px_#fbbf2466]' : 'bg-[#09090b]/80 text-amber-400 border-amber-400/30 hover:bg-amber-400/10'}`}>
                    <i className="ph ph-split-vertical mr-2"></i> {t.studio.split}
                    <div className="tooltip tooltip-bottom">{t.tooltips.split}</div>
                  </button>
                </div>
              )}

              <div ref={containerRef} 
                   className={`relative w-full flex-1 flex items-center justify-center overflow-hidden ${effectiveTool === 'pan' ? (isMouseDown ? 'cursor-grabbing' : 'cursor-grab') : effectiveTool.startsWith('select-') ? 'cursor-crosshair' : 'cursor-none'}`} 
                   onContextMenu={(e) => { e.preventDefault(); }} 
                   onMouseDown={handleMouseDown} 
                   onMouseMove={handleMouseMove} 
                   onMouseUp={handleMouseUp} 
                   onMouseLeave={handleMouseUp}>
                
                {!images[selectedImageIndex] ? (
                  <div className="flex flex-col items-center text-slate-700">
                    <i className="ph ph-image text-8xl mb-4"></i>
                    <span className="text-[10px] font-bold uppercase tracking-widest">Awaiting Content</span>
                  </div>
                ) : (
                  <div style={{ transform: `translate(${panOffset.x}px, ${panOffset.y}px) scale(${zoom})`, transformOrigin: 'center center' }} className="relative pointer-events-none">
                     
                     {/* A (SOURCE) BADGE */}
                     <div className="absolute -top-6 left-0 text-[8px] font-black uppercase text-slate-500 tracking-widest pointer-events-none">A (Source)</div>

                     <div className="relative flex-shrink-0 shadow-[0_20px_50px_rgba(0,0,0,0.8)] bg-[#1a1a1f] ring-1 ring-amber-400/30 overflow-hidden pointer-events-auto" 
                          style={{ height: '65vh', aspectRatio: activeRatio.id.replace(':', '/'), backgroundImage: 'repeating-linear-gradient(45deg, rgba(255,255,255,0.03) 25%, transparent 25%, transparent 75%, rgba(255,255,255,0.03) 75%, rgba(255,255,255,0.03)), repeating-linear-gradient(45deg, rgba(255,255,255,0.03) 25%, transparent 25%, transparent 75%, rgba(255,255,255,0.03) 75%, rgba(255,255,255,0.03))', backgroundPosition: '0 0, 10px 10px', backgroundSize: '20px 20px' }}>
                        
                       {/* SPLIT SCREEN MODE OR NORMAL MODE */}
                       {isSplitMode && imageResult ? (
                         <div className="relative w-full h-full">
                            <img src={images[selectedImageIndex]?.url} className="absolute inset-0 w-full h-full object-contain" draggable="false" />
                            <img src={imageResult} style={{ clipPath: `inset(0 ${100 - splitPosition}% 0 0)` }} className="absolute inset-0 w-full h-full object-contain" draggable="false" />
                            <input type="range" min="0" max="100" value={splitPosition} onChange={(e)=>setSplitPosition(e.target.value)} className="split-slider pointer-events-auto" />
                            <div className="absolute top-0 bottom-0 w-[2px] bg-white pointer-events-none shadow-[0_0_10px_rgba(0,0,0,0.5)]" style={{ left: `${splitPosition}%` }}>
                               <div className="absolute top-1/2 -translate-y-1/2 -translate-x-1/2 w-6 h-6 bg-white rounded-full flex items-center justify-center text-black shadow-lg"><i className="ph ph-caret-left-right text-xs"></i></div>
                            </div>
                         </div>
                       ) : (
                         <>
                           <img src={imageResult || images[selectedImageIndex]?.url} className="absolute inset-0 w-full h-full object-contain pointer-events-none" draggable="false" />
                           <canvas ref={canvasRef} width={canvasRes.w} height={canvasRes.h} className="absolute inset-0 w-full h-full z-20 pointer-events-none opacity-80" />
                           <canvas ref={overlayCanvasRef} width={canvasRes.w} height={canvasRes.h} className="absolute inset-0 w-full h-full z-21 pointer-events-none" style={{ opacity: effectiveTool === 'eraser' ? 1 : brushOpacity }} />
                           
                           {selectionStart && selectionCurrent && (
                             <svg className="absolute inset-0 w-full h-full pointer-events-none z-30" viewBox={`0 0 ${canvasRes.w} ${canvasRes.h}`} preserveAspectRatio="none">
                                {effectiveTool === 'select-rect' && (
                                   <g>
                                      <rect x={Math.min(selectionStart.x, selectionCurrent.x)} y={Math.min(selectionStart.y, selectionCurrent.y)} width={Math.abs(selectionCurrent.x - selectionStart.x)} height={Math.abs(selectionCurrent.y - selectionStart.y)} className="ants-black" />
                                      <rect x={Math.min(selectionStart.x, selectionCurrent.x)} y={Math.min(selectionStart.y, selectionCurrent.y)} width={Math.abs(selectionCurrent.x - selectionStart.x)} height={Math.abs(selectionCurrent.y - selectionStart.y)} className="ants-white" />
                                   </g>
                                )}
                                {effectiveTool === 'select-ellipse' && (
                                   <g>
                                      <ellipse cx={(selectionStart.x + selectionCurrent.x)/2} cy={(selectionStart.y + selectionCurrent.y)/2} rx={Math.abs(selectionCurrent.x - selectionStart.x)/2} ry={Math.abs(selectionCurrent.y - selectionStart.y)/2} className="ants-black" />
                                      <ellipse cx={(selectionStart.x + selectionCurrent.x)/2} cy={(selectionStart.y + selectionCurrent.y)/2} rx={Math.abs(selectionCurrent.x - selectionStart.x)/2} ry={Math.abs(selectionCurrent.y - selectionStart.y)/2} className="ants-white" />
                                   </g>
                                )}
                                {effectiveTool === 'select-lasso' && (
                                   <g>
                                      <polyline points={selectionPointsRef.current.map(p => `${p.x},${p.y}`).join(' ')} className="ants-black" />
                                      <polyline points={selectionPointsRef.current.map(p => `${p.x},${p.y}`).join(' ')} className="ants-white" />
                                   </g>
                                )}
                             </svg>
                           )}
                         </>
                       )}
                     </div>
                  </div>
                )}

                {/* BRUSH CURSOR VISUALIZATION (LIKE PHOTOSHOP) */}
                {(effectiveTool === 'brush' || effectiveTool === 'eraser') && (!isMouseDown || isAdjustingBrush) && !isSplitMode && (
                  <div className="absolute pointer-events-none z-[60] flex items-center justify-center" 
                       style={{ left: cursorPos.x, top: cursorPos.y, transform: 'translate(-50%, -50%)' }}>
                     
                     {/* True Gradient Preview for Softness & Size */}
                     <div className="absolute rounded-full" 
                          style={{ 
                            width: brushSize, 
                            height: brushSize, 
                            background: `radial-gradient(circle, rgba(${previewRgbStr}, ${isAdjustingBrush ? 0.6 : 0.15}) ${Math.max(0, 100 - brushSoftness)}%, rgba(${previewRgbStr}, 0) 100%)` 
                          }} />

                     {/* Crosshair (Always visible for precision) */}
                     <div className="w-[10px] h-[10px] flex items-center justify-center opacity-90 mix-blend-difference z-10">
                         <div className="w-full h-[1px] bg-white absolute"></div>
                         <div className="w-[1px] h-full bg-white absolute"></div>
                     </div>

                     {/* Outer Boundary */}
                     <div className="absolute rounded-full border shadow-[0_0_2px_rgba(0,0,0,0.5)]" 
                          style={{ width: brushSize, height: brushSize, borderColor: `rgba(${previewRgbStr}, 0.5)` }} />
                  </div>
                )}
                
                {/* MODIFIER KEY VISUALIZATION (+ / -) */}
                {(effectiveTool.startsWith('select-') || effectiveTool === 'brush' || effectiveTool === 'eraser') && (!isMouseDown) && !isSplitMode && (
                  <div className="absolute pointer-events-none z-[61] font-black text-[18px] drop-shadow-[0_0_3px_rgba(0,0,0,1)] text-white" 
                       style={{ left: cursorPos.x + 15, top: cursorPos.y + 15 }}>
                      {modifiers.alt ? '-' : (modifiers.shift ? '+' : '')}
                  </div>
                )}

                {status === 'processing' && (
                  <div className="absolute inset-0 bg-[#09090b]/80 backdrop-blur-md z-[100] flex flex-col items-center justify-center animate-in">
                     <i className="ph ph-circle-notch text-4xl text-amber-400 animate-spin mb-4"></i>
                     <span className="text-[10px] font-black uppercase tracking-[0.3em] text-amber-400 animate-pulse">{statusMessage}</span>
                  </div>
                )}
                {status === 'error' && (
                  <div className="absolute inset-0 bg-[#09090b]/90 backdrop-blur-md z-[100] flex flex-col items-center justify-center animate-in">
                     <i className="ph ph-warning-octagon text-5xl text-red-500 mb-4"></i>
                     <span className="text-[11px] font-black uppercase tracking-widest text-white">{statusMessage}</span>
                  </div>
                )}
              </div>

              {/* CONSOLE AREA (COLLAPSIBLE - UX 2) */}
              <div className={`w-full max-w-4xl mx-auto relative z-30 px-4 transition-all duration-500 ease-[cubic-bezier(0.4,0,0.2,1)] ${isConsoleExpanded ? 'pb-6' : 'pb-0'}`}>
                
                {/* PROMPT OUTPUT DRAWER */}
                {promptResult && activeTab === 'studio' && isConsoleExpanded && (
                  <div className="mb-4 bg-white/5 border border-white/10 rounded-2xl p-4 relative group animate-in">
                    <p className="text-[11px] text-slate-300 font-mono select-all pr-8">"{promptResult}"</p>
                    <button onClick={() => setPromptResult("")} className="absolute top-4 right-4 text-slate-500 hover:text-white"><i className="ph ph-x"></i></button>
                  </div>
                )}

                <div className="bg-[#09090b]/90 backdrop-blur-2xl border border-white/10 rounded-t-[1.5rem] rounded-b-[1.5rem] shadow-[0_-10px_40px_rgba(0,0,0,0.5)] transition-all flex flex-col overflow-hidden">
                   
                   {/* CONSOLE HEADER (Always visible) */}
                   <div onClick={() => setIsConsoleExpanded(!isConsoleExpanded)} className="flex items-center justify-between p-4 cursor-pointer hover:bg-white/5 transition-colors">
                      <div className="flex items-center gap-2 text-[10px] font-black uppercase tracking-widest text-slate-400">
                        <i className="ph ph-terminal-window text-base text-amber-400"></i> PROMPT CONSOLE
                      </div>
                      <div className="flex items-center gap-4">
                        {!isConsoleExpanded && instruction && <span className="text-[10px] text-slate-500 font-mono truncate max-w-xs">"{instruction}"</span>}
                        <i className={`ph ph-caret-${isConsoleExpanded ? 'down' : 'up'} text-slate-500`}></i>
                      </div>
                   </div>

                   {/* CONSOLE BODY */}
                   <div className={`transition-all duration-300 ease-in-out ${isConsoleExpanded ? 'max-h-[500px] opacity-100 pb-4 px-4' : 'max-h-0 opacity-0 pointer-events-none'}`}>
                     <div className="flex items-center gap-2 mb-3 px-2 text-slate-500 text-[9px] font-bold uppercase tracking-widest">
                       <i className="ph ph-lightbulb text-amber-400"></i> Tip: {t.tips[currentTip]}
                     </div>

                     {/* Affichage des tags sélectionnés dans le Composer */}
                     {activeMatrixTags.length > 0 && (
                       <div className="flex gap-2 pb-3 mb-2 overflow-x-auto custom-scrollbar border-b border-white/5">
                         {activeMatrixTags.map(([k, v]) => (
                            <span key={k} className="px-2 py-1 bg-amber-400/10 border border-amber-400/30 rounded-md text-[8px] font-mono text-amber-400 uppercase whitespace-nowrap">{v}</span>
                         ))}
                       </div>
                     )}

                     {/* Affichage des Quick Tags en un clic (Prévention des doublons) */}
                     <div className="flex gap-2 overflow-x-auto pb-3 custom-scrollbar mb-1">
                        {QUICK_TAGS[lang].map((tag) => {
                          const isIncluded = instruction.includes(tag);
                          return (
                            <button key={tag} onClick={() => { if(!isIncluded) setInstruction(p => p + (p && !p.endsWith(' ') ? ', ' : '') + tag); }} className={`whitespace-nowrap px-3 py-1.5 rounded-full border text-[9px] font-bold uppercase tracking-tighter transition-all ${isIncluded ? 'border-amber-400/20 text-amber-400/50 cursor-default bg-amber-400/5' : 'border-white/10 text-slate-500 hover:text-amber-400 hover:border-amber-400/40 hover:bg-amber-400/10'}`}>
                              # {tag}
                            </button>
                          );
                        })}
                     </div>

                     <textarea value={instruction} onChange={(e) => setInstruction(e.target.value)} placeholder={t.placeholder} className="w-full bg-black/20 border border-white/5 rounded-xl text-slate-200 text-[13px] outline-none min-h-[90px] placeholder:text-slate-600 p-3 custom-scrollbar focus:border-amber-400/50 transition-colors" />
                     
                     <div className="flex items-center justify-between pt-3 mt-1">
                        <div className="flex items-center gap-2 overflow-x-auto pb-1 max-w-[50%] custom-scrollbar">
                           <EnhancerButton id="upscale" icon="ph-corners-out" label={t.enhancers.upscale} tooltipKey="upscale" />
                           <EnhancerButton id="raw" icon="ph-camera" label={t.enhancers.raw} tooltipKey="raw" />
                           <EnhancerButton id="face" icon="ph-fingerprint" label={t.enhancers.face} tooltipKey="face" />
                           <EnhancerButton id="isolate" icon="ph-crosshair" label={t.enhancers.isolate} tooltipKey="isolate" />
                        </div>
                        <div className="flex items-center gap-3">
                          {instruction && (
                            <button onClick={() => setInstruction("")} className="has-tooltip relative text-[10px] font-bold uppercase text-slate-500 hover:text-white px-2 py-2">Clear<div className="tooltip tooltip-top">{t.tooltips.clear}</div></button>
                          )}
                          {imageResult && (
                            <button onClick={() => saveImageWithMeta(imageResult)} className="has-tooltip relative px-5 py-2.5 bg-white/5 text-slate-300 border border-white/10 rounded-xl text-[10px] font-bold uppercase hover:bg-white/10 hover:text-white transition-all flex items-center gap-2"><i className="ph ph-download-simple text-sm"></i> Save<div className="tooltip tooltip-top">{t.tooltips.save} (Ctrl+S)</div></button>
                          )}
                          <button onClick={() => runAction(activeTab === 'composer' ? 'prompt' : 'edit')} disabled={status === 'processing' || (!instruction && !activeAction && activeTab !== 'composer')} className="has-tooltip relative px-8 py-3 bg-amber-400 text-black rounded-xl font-black text-[10px] uppercase shadow-[0_0_20px_rgba(251,191,36,0.3)] hover:scale-105 disabled:opacity-50 disabled:hover:scale-100 transition-all flex items-center gap-2">
                            <i className="ph ph-magic-wand text-sm"></i> {activeTab === 'composer' ? t.build : t.generate}
                            <div className="tooltip tooltip-top">{t.tooltips.process}</div>
                          </button>
                        </div>
                     </div>
                   </div>
                </div>
              </div>
            </section>
          </main>

          {/* MODAL POPUP POUR LE RENDU FINAL */}
          {showModal && modalImage && (
            <div className="fixed inset-0 z-[1000] bg-[#09090b]/80 backdrop-blur-xl flex items-center justify-center animate-in p-6">
              <div className="bg-[#121214] border border-white/10 rounded-3xl shadow-[0_20px_60px_rgba(0,0,0,0.8)] flex flex-col max-w-5xl w-full max-h-full overflow-hidden">
                <div className="flex items-center justify-between p-5 border-b border-white/5 bg-black/20">
                  <h3 className="text-white font-black tracking-widest text-[11px] uppercase flex items-center gap-2">
                    <i className="ph-fill ph-sparkle text-amber-400 text-base"></i> {lang === 'fr' ? 'Rendu Terminé' : 'Render Complete'}
                  </h3>
                  <button onClick={() => setShowModal(false)} className="text-slate-500 hover:text-white transition-colors">
                    <i className="ph ph-x text-xl"></i>
                  </button>
                </div>
                
                <div className="flex-1 overflow-hidden p-6 flex items-center justify-center bg-[radial-gradient(circle,rgba(255,255,255,0.03)_1px,transparent_1px)]" style={{ backgroundSize: '20px 20px' }}>
                   <img src={modalImage} className="max-w-full max-h-[60vh] object-contain rounded-xl shadow-2xl ring-1 ring-white/10" draggable="false" />
                </div>
                
                <div className="p-5 border-t border-white/5 flex items-center justify-between bg-black/40">
                   <button onClick={() => setShowModal(false)} className="text-[10px] font-bold uppercase tracking-widest text-slate-500 hover:text-red-400 transition-colors px-4 py-2">
                     {lang === 'fr' ? 'Annuler' : 'Discard'}
                   </button>
                   <div className="flex items-center gap-3">
                      <button onClick={() => saveImageWithMeta(modalImage)} className="px-6 py-3 bg-white/5 border border-white/10 rounded-xl text-[10px] font-bold uppercase tracking-widest text-slate-300 hover:bg-white/10 hover:text-white transition-all flex items-center gap-2">
                        <i className="ph ph-download-simple text-base"></i> {lang === 'fr' ? 'Télécharger HD' : 'Download HD'}
                      </button>
                      <button onClick={() => { setImageResult(modalImage); setIsSplitMode(true); setShowModal(false); }} className="px-8 py-3 bg-amber-400 text-black rounded-xl text-[10px] font-black uppercase tracking-widest hover:scale-105 shadow-[0_0_20px_rgba(251,191,36,0.3)] transition-all flex items-center gap-2">
                        <i className="ph-fill ph-check-circle text-base"></i> {lang === 'fr' ? 'Appliquer au Canvas' : 'Apply to Canvas'}
                      </button>
                   </div>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
