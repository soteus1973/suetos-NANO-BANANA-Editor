    .tooltip {

      border: 1px solid rgba(251,191,36,0.3); opacity: 0; visibility: hidden;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); z-index: 999;
      pointer-events: none; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.8);
      text-transform: none; letter-spacing: normal;
    }
    .has-tooltip:hover > .tooltip { opacity: 1; visibility: visible; }
    .tooltip-top { bottom: 100%; left: 50%; transform: translate(-50%, -8px); }
    .has-tooltip:hover > .tooltip-top { transform: translate(-50%, -12px); }
    .tooltip-bottom { top: 100%; left: 50%; transform: translate(-50%, 8px); }
    .has-tooltip:hover > .tooltip-bottom { transform: translate(-50%, 12px); }
    .tooltip-right { left: 100%; top: 50%; transform: translate(8px, -50%); }
    .has-tooltip:hover > .tooltip-right { transform: translate(12px, -50%); }
    .tooltip-left { right: 100%; top: 50%; transform: translate(-8px, -50%); }
    .has-tooltip:hover > .tooltip-left { transform: translate(-12px, -50%); }

    .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(251,191,36,0.1); border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

    @keyframes fade-in { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    .animate-in { animation: fade-in 0.3s ease-out forwards; }

    input[type="range"].styled-slider { -webkit-appearance: none; background: rgba(255,255,255,0.1); border-radius: 10px; height: 3px; }
    input[type="range"].styled-slider::-webkit-slider-thumb { -webkit-appearance: none; height: 12px; width: 12px; border-radius: 50%; background: #fff; cursor: pointer; border: 2px solid #09090b; transition: background 0.2s; }
    input[type="range"].styled-slider:active::-webkit-slider-thumb { background: #fbbf24; }

    input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

    @keyframes marching-ants { to { stroke-dashoffset: -10; } }

    input[type="range"].split-slider::-webkit-slider-thumb { -webkit-appearance: none; height: 100vh; width: 40px; background: transparent; cursor: ew-resize; }

      useEffect(() => {

      // Auto-test au mount — lit tout depuis localStorage, passe les overrides explicitement

      // Persist counters
      useEffect(() => {

      }, [tokensUsed, imagesGenerated]);

      useEffect(() => {

      // Canvas res selon ratio

      // Processing timer

          const timer = setInterval(() => {

      useEffect(() => {

        };

      // Keyboard shortcuts
      useEffect(() => {
        const down = (e) => {
          const tag = document.activeElement?.tagName;
          if (['TEXTAREA','INPUT','SELECT'].includes(tag)) return;
          if (e.code === 'Space') { e.preventDefault(); setIsSpaceDown(true); }
          if (e.key === '-' || e.key === '_') setBrushSize(p => Math.max(5, p - 5));
          if (e.key === '+' || e.key === '=') setBrushSize(p => Math.min(500, p + 5));
          if (e.key.toLowerCase() === 'b') setToolMode('brush');
          if (e.key.toLowerCase() === 'e') setToolMode('eraser');
          if (e.key.toLowerCase() === 'h') setToolMode('pan');
          if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z') { e.preventDefault(); handleUndo(); }
          if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 's') { e.preventDefault(); if (imageResult) saveImageWithMeta(imageResult); }
        };
        const up = (e) => { if (e.code === 'Space') setIsSpaceDown(false); };
        window.addEventListener('keydown', down);
        window.addEventListener('keyup', up);
        return () => { window.removeEventListener('keydown', down); window.removeEventListener('keyup', up); };
      }, [imageResult]);

      // Sidebar resize
      useEffect(() => {
        if (!isResizingSidebar) return;

        const mu = () => setIsResizingSidebar(false);
        document.addEventListener('mousemove', mm);
        document.addEventListener('mouseup', mu);
        return () => { document.removeEventListener('mousemove', mm); document.removeEventListener('mouseup', mu); };
      }, [isResizingSidebar]);

      // Toolbar drag
      useEffect(() => {
        if (!isDraggingToolbar) return;
        const mm = (e) => {
          if (!containerRef.current) return;
          const r = containerRef.current.getBoundingClientRect();
          setToolbarPos({ x: e.clientX - r.left - dragOffset.current.x, y: e.clientY - r.top - dragOffset.current.y });
        };
        const mu = (e) => {
          setIsDraggingToolbar(false);
          if (!toolbarRef.current || !containerRef.current) return;
          const tr = toolbarRef.current.getBoundingClientRect();
          const cr = containerRef.current.getBoundingClientRect();
          let x = e.clientX - cr.left - dragOffset.current.x;
          let y = e.clientY - cr.top - dragOffset.current.y;
          if (x < 24) x = 24; else if (x > cr.width - tr.width - 24) x = cr.width - tr.width - 24;
          if (y < 24) y = 24; else if (y > cr.height - tr.height - 24) y = cr.height - tr.height - 24;
          setToolbarPos({ x, y });
        };
        document.addEventListener('mousemove', mm);
        document.addEventListener('mouseup', mu);
        return () => { document.removeEventListener('mousemove', mm); document.removeEventListener('mouseup', mu); };
      }, [isDraggingToolbar]);

      const updateModifiers = (e) => {
        const s = e.shiftKey, a = e.altKey, c = e.ctrlKey || e.metaKey;
        activeModifiersRef.current = { shift: s, alt: a, ctrl: c };
        setModifiers(p => (p.shift !== s || p.alt !== a || p.ctrl !== c) ? { shift: s, alt: a, ctrl: c } : p);
      };
      useEffect(() => {
        window.addEventListener('keydown', updateModifiers);
        window.addEventListener('keyup', updateModifiers);
        window.addEventListener('mousemove', updateModifiers);
        return () => {
          window.removeEventListener('keydown', updateModifiers);
          window.removeEventListener('keyup', updateModifiers);
          window.removeEventListener('mousemove', updateModifiers);
        };
      }, []);

      // ── API Helpers ────────────────────────────────────────────────────────
      const saveConfig = () => {
        localStorage.setItem('nbe_api_key', apiKey.trim());
        localStorage.setItem('nbe_comet_key', cometApiKey.trim());
        localStorage.setItem('nbe_worker_url', workerUrl.trim().replace(/\/+$/, ''));
        localStorage.setItem('nbe_api_mode', apiMode);
        localStorage.setItem('nbe_model', selectedModel);
        localStorage.setItem('nbe_lang', lang);
        try { localStorage.setItem('nbe_advanced_params', JSON.stringify(advancedParams)); } catch(e){}
      };

      // buildApiRequest accepte des overrides explicites pour éviter les race conditions React
      const buildApiRequest = (modelName, overrides = {}) => {
        const mode = overrides.mode !== undefined ? overrides.mode : apiMode;
        const wUrl = (overrides.workerUrl !== undefined ? overrides.workerUrl : workerUrl).trim().replace(/\/+$/, '');
        const cKey = (overrides.cometApiKey !== undefined ? overrides.cometApiKey : cometApiKey).trim();
        const gKey = (overrides.apiKey !== undefined ? overrides.apiKey : apiKey).trim();
        if (mode === 'cloudflare') {
          return { url: `${wUrl}/v1beta/models/${modelName}:generateContent`, headers: { 'Content-Type': 'application/json' } };
        } else if (mode === 'cometapi') {
          return { url: `https://api.cometapi.com/v1beta/models/${modelName}:generateContent`, headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${cKey}` } };
        } else {
          return { url: `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent${gKey ? '?key=' + gKey : ''}`, headers: { 'Content-Type': 'application/json' } };

      // ─── TEST DE CONNEXION ────────────────────────────────────────────────────

      // Shared safety settings for text-based API calls — only used for explicit BLOCK_NONE
      // Gemini 2.5+ and 3.x models have safety filters OFF by default — no need to send settings
      const TEXT_SAFETY_NONE = [
        { category: 'HARM_CATEGORY_HARASSMENT', threshold: 'BLOCK_NONE' },
        { category: 'HARM_CATEGORY_HATE_SPEECH', threshold: 'BLOCK_NONE' },
        { category: 'HARM_CATEGORY_SEXUALLY_EXPLICIT', threshold: 'BLOCK_NONE' },
        { category: 'HARM_CATEGORY_DANGEROUS_CONTENT', threshold: 'BLOCK_NONE' }
      ];

      const testApiConnectionWithOverrides = async (mode, wUrl, cKey, gKey) => {
        setApiStatus('testing');
        setStatusMessage('TESTING CONNECTION...');

        const wUrlClean = (wUrl || '').trim().replace(/\/+$/, '');
        const cKeyClean = (cKey || '').trim();
        const gKeyClean = (gKey || '').trim();
        const overrides = { mode, workerUrl: wUrlClean, cometApiKey: cKeyClean, apiKey: gKeyClean };

        try {
          // Toujours tester avec gemini-2.5-flash — supporté par le Worker Cloudflare
          const { url, headers } = buildApiRequest(TEST_MODEL, overrides);
          const res = await fetchWithTimeout(url, {
            method: 'POST', headers,
            body: JSON.stringify({
              contents: [{ parts: [{ text: 'Say OK' }] }],
              generationConfig: { maxOutputTokens: 5 }
            })
          }, 15000);

          if (!res.ok) {
            const txt = await res.text();
            let msg = `HTTP ${res.status}`;
            try { msg = JSON.parse(txt).error?.message || msg; } catch(ex) { msg = txt.substring(0, 100); }
            throw new Error(msg);
          }

          // Succès
          setApiStatus('success');
          setStatusMessage(lang === 'fr' ? 'CONNEXION ÉTABLIE ✓' : 'CONNECTED ✓');
        } catch(e) {
          setApiStatus('error');
          const et = (e.message || '').toLowerCase();
          if (et.includes('networkerror') || et.includes('failed to fetch') || et.includes('cors')) {
            setStatusMessage(mode === 'gemini' ? 'CORS — UTILISEZ CLOUDFLARE' : 'ERREUR RÉSEAU');
          } else if (et.includes('api key') || et.includes('invalid') || et.includes('403') || et.includes('api_key')) {
            setStatusMessage('CLÉ API INVALIDE');
          } else if (et.includes('404') || et.includes('not found')) {
            setStatusMessage('WORKER URL INCORRECTE');
          } else if (et.includes('429') || et.includes('quota') || et.includes('exhausted') || et.includes('resource')) {
            setStatusMessage('QUOTA DÉPASSÉ');
          } else {
            // Afficher le message brut de l'API pour debug
            setStatusMessage((e.message || 'ÉCHEC CONNEXION').substring(0, 45).toUpperCase());
          }
        }
      };

      // testApiConnection — version qui lit le state React courant (pour le bouton "Tester")
      const testApiConnection = async () => {
        saveConfig();
        await testApiConnectionWithOverrides(apiMode, workerUrl, cometApiKey, apiKey);

      // ── Traduction automatique ─────────────────────────────────────────────
      const switchLanguage = async (newLang) => {
        if (lang === newLang) return;
        const oldLang = lang;

        saveConfig();
        setStatus('processing');
        setStatusMessage(newLang === 'fr' ? 'TRADUCTION...' : 'TRANSLATING...');

            method: 'POST', headers,
            body: JSON.stringify({
              contents: [{ parts: [{ text: `Translate this image generation prompt to ${newLang === 'fr' ? 'French' : 'English'}. Keep the EXACT same length and all details. Output ONLY the complete translation, no quotes, no markdown:\n${instruction}` }] }],
              generationConfig: { maxOutputTokens: 2000 },
            })
          }, 20000);
          if (res.ok) {
            const data = await res.json();
            const translated = data.candidates?.[0]?.content?.parts?.[0]?.text?.trim();
            if (translated) { setInstruction(translated); setStatus('idle'); return; }
          }
        } catch(e) { console.warn('Translation failed, using fallback'); }
        // Fallback local

        QUICK_TAGS[oldLang].forEach((tag, i) => { updated = updated.replace(new RegExp(esc(tag), 'gi'), QUICK_TAGS[newLang][i]); });
        CATEGORIES.forEach(cat => { cat.options[oldLang].forEach((opt, i) => { updated = updated.replace(new RegExp(esc(opt), 'gi'), cat.options[newLang][i]); }); });
        setInstruction(updated);

      // ── Analyze DNA ────────────────────────────────────────────────────────

        setStatus('processing');
        setStatusMessage('ANALYZING IMAGE DNA...');

          const { url, headers } = buildApiRequest(TEST_MODEL);
          const res = await fetchWithTimeout(url, {
            method: 'POST', headers,
            body: JSON.stringify({
              contents: [{ parts: [
                { inlineData: { mimeType: 'image/jpeg', data: img.base64 } },
                { text: 'Analyze this image in detail. Return ONLY a valid JSON object with no markdown formatting, no backticks, no explanation. Format: {"instruction":"very detailed description of the image content, composition, colors, textures, materials, atmosphere","camera":"specific lens/focal length","lighting":"specific lighting style","mood":"mood and atmosphere","artist":"most similar artist or photographer style","render":"rendering engine if 3D/CGI, or N/A","film":"film stock if photographic, or N/A"}' }
              ]}],
              generationConfig: { maxOutputTokens: 1000 },
            })
          }, 60000);
          if (!res.ok) {
            const errTxt = await res.text();
            let errMsg = `HTTP ${res.status}`;
            try { errMsg = JSON.parse(errTxt).error?.message || errMsg; } catch(ex) {}
            throw new Error(errMsg);
          }
          const data = await res.json();
          setTokensUsed(p => p + (data.usageMetadata?.totalTokenCount || 350));
          const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || '{}';
          console.log('DNA raw response:', raw.substring(0, 300));
          let dna = {};
          try {
            let cleaned = raw.replace(/```json\s*/g, '').replace(/```/g, '').trim();
            dna = JSON.parse(cleaned);
          } catch(e) {
            const m = raw.match(/\{[\s\S]*\}/);

          }

            lighting: dna.lighting && dna.lighting !== 'N/A' ? dna.lighting : '',
            mood: dna.mood && dna.mood !== 'N/A' ? dna.mood : '',
            artist: dna.artist && dna.artist !== 'N/A' ? dna.artist : '',
            render: dna.render && dna.render !== 'N/A' ? dna.render : '',
            film: dna.film && dna.film !== 'N/A' ? dna.film : ''
          });
          setIsConsoleExpanded(true);
          showToast(lang === 'fr' ? 'ADN EXTRAIT !' : 'DNA EXTRACTED!');
          setStatus('idle');
        } catch(e) {
          setStatus('error');
          setStatusMessage((e.message || 'DNA FAILED').substring(0, 45).toUpperCase());
          setTimeout(() => setStatus('idle'), 4000);
        }
      };

      // ── Auto Mask Subject ──────────────────────────────────────────────────
      const autoMaskSubject = async () => {
        const img = selectedImageIndex !== null ? images[selectedImageIndex] : images[0];
        if (!img) { showToast('Image required!'); return; }
        saveConfig();
        setStatus('processing');
        setStatusMessage('AI SUBJECT DETECTION...');
        try {
          const { url, headers } = buildApiRequest(TEST_MODEL);
          const res = await fetchWithTimeout(url, {
            method: 'POST', headers,
            body: JSON.stringify({
              contents: [{ parts: [
                { inlineData: { mimeType: 'image/jpeg', data: img.base64 } },
                { text: 'Find the main subject bounding box. Return ONLY a JSON array [ymin, xmin, ymax, xmax] scaled 0-1000. Example: [150, 200, 850, 750]' }
              ]}],
              generationConfig: { maxOutputTokens: 50 }
            })
          }, 45000);
          if (!res.ok) {
            const errTxt = await res.text();
            let errMsg = `HTTP ${res.status}`;
            try { errMsg = JSON.parse(errTxt).error?.message || errMsg; } catch(ex) {}
            throw new Error(errMsg);
          }
          const data = await res.json();
          setTokensUsed(p => p + (data.usageMetadata?.totalTokenCount || 200));
          const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || '[]';
          console.log('AutoMask raw:', raw);
          const m = raw.match(/\[[\d\s,]+\]/);
          let arr;
          try { arr = m ? JSON.parse(m[0]) : JSON.parse(raw); } catch(parseErr) { throw new Error('AI response not parseable: ' + raw.substring(0, 60)); }
          if (arr?.length === 4 && canvasRef.current) {
            const [ymin, xmin, ymax, xmax] = arr;
            const ctx = canvasRef.current.getContext('2d');
            const cw = canvasRef.current.width, ch = canvasRef.current.height;
            saveCanvasState();
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = brushColor.value;
            ctx.globalAlpha = brushOpacity;
            ctx.fillRect((xmin/1000)*cw, (ymin/1000)*ch, ((xmax-xmin)/1000)*cw, ((ymax-ymin)/1000)*ch);

      // ── HELPERS PARTAGÉS ──────────────────────────────────────────────────

      // Upscale base64 image to target size, returns blob URL
      // PERF: skips upscale if image is already within 10% of target
      const upscaleBase64 = (b64, targetPx = 2048) => new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          try {
            let w = img.naturalWidth, h = img.naturalHeight;
            const maxDim = Math.max(w, h);
            // Skip if already close enough to target (within 10%)
            if (maxDim >= targetPx * 0.9 && maxDim <= targetPx * 1.1) {
              const c = document.createElement('canvas');
              c.width = w; c.height = h;
              c.getContext('2d').drawImage(img, 0, 0);
              c.toBlob(blob => resolve(blob ? URL.createObjectURL(blob) : `data:image/png;base64,${b64}`), 'image/jpeg', 0.95);
              return;
            }
            if (w >= h) { h = Math.round(targetPx * (h/w)); w = targetPx; }
            else { w = Math.round(targetPx * (w/h)); h = targetPx; }
            const c = document.createElement('canvas');
            c.width = w; c.height = h;
            const ctx = c.getContext('2d');
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';
            ctx.drawImage(img, 0, 0, w, h);
            c.toBlob(blob => resolve(blob ? URL.createObjectURL(blob) : `data:image/png;base64,${b64}`), 'image/jpeg', 0.95);
          } catch(e) { resolve(`data:image/png;base64,${b64}`); }
        };
        img.onerror = () => resolve(`data:image/png;base64,${b64}`);
        img.src = `data:image/png;base64,${b64}`;
      });

      const getMaskBase64 = () => {
        if (!canvasRef.current) return null;
        const src = canvasRef.current;
        const ctx = src.getContext('2d');
        const data = ctx.getImageData(0, 0, src.width, src.height);
        const binCanvas = document.createElement('canvas');
        binCanvas.width = src.width; binCanvas.height = src.height;
        const binCtx = binCanvas.getContext('2d');
        const binData = binCtx.createImageData(src.width, src.height);
        let hasContent = false;
        for (let i = 0; i < data.data.length; i += 4) {
          const hasAlpha = data.data[i + 3] > 20;
          if (hasAlpha) hasContent = true;
          binData.data[i]     = hasAlpha ? 255 : 0;
          binData.data[i + 1] = hasAlpha ? 255 : 0;
          binData.data[i + 2] = hasAlpha ? 255 : 0;
          binData.data[i + 3] = 255;
        }
        if (!hasContent) return null;
        binCtx.putImageData(binData, 0, 0);
        return binCanvas.toDataURL('image/png').split(',')[1];

      // ── GÉNÉRATION / ÉDITION D'IMAGE ───────────────────────────────────────

              : `You are an expert AI image generation prompt engineer. Take the user's concept below and transform it into a highly detailed, optimized text-to-image prompt (200-300 words). Include specific details about: subject, composition, lighting, colors, textures, mood, camera angle, artistic style, and technical quality parameters.

User's concept: "${userPrompt}"${matrixContext}${enhContext}${negContext}

Output ONLY the optimized prompt text. No quotes, no markdown, no explanation.`;

            buildPromptParts.push({ text: buildInstruction });

          let apiRatio = null;

      const compressAndLoad = (file) => {
        extractImageMeta(file);
        return new Promise((resolve) => {
          const reader = new FileReader();
          reader.readAsDataURL(file);
          reader.onload = (ev) => {
            const img = new Image();
            img.src = ev.target.result;
            img.onload = () => {

              const dc = document.createElement('canvas');
              const DM = 2048; let dw = img.width, dh = img.height;
              if (dw > DM) { dh = Math.round(dh * DM/dw); dw = DM; }
              else if (dh > DM) { dw = Math.round(dw * DM/dh); dh = DM; }

              const AM = 1536; let aw = img.width, ah = img.height;

                                <g>
                                  <rect x={Math.min(selectionStart.x, selectionCurrent.x)} y={Math.min(selectionStart.y, selectionCurrent.y)} width={Math.abs(selectionCurrent.x-selectionStart.x)} height={Math.abs(selectionCurrent.y-selectionStart.y)} className="ants-black" />
                                  <rect x={Math.min(selectionStart.x, selectionCurrent.x)} y={Math.min(selectionStart.y, selectionCurrent.y)} width={Math.abs(selectionCurrent.x-selectionStart.x)} height={Math.abs(selectionCurrent.y-selectionStart.y)} className="ants-white" />
                                </g>

                                  <polyline points={selectionPointsRef.current.map(p=>`${p.x},${p.y}`).join(' ')} className="ants-white" />

                              )}
                            </svg>

                    </div>

                    </div>
                    <div className="absolute rounded-full border" style={{ width: brushSize, height: brushSize, borderColor: `rgba(${previewRgb}, 0.5)` }} />
                  </div>

                {(effectiveTool.startsWith('select-') || effectiveTool === 'brush' || effectiveTool === 'eraser') && !isMouseDown && !isSplitMode && (modifiers.alt || modifiers.shift) && (

                  <div className="absolute inset-0 bg-[#09090b]/85 backdrop-blur-lg z-[100] flex flex-col items-center justify-center animate-in">

                      <span className="text-[9px] text-emerald-400 font-bold uppercase tracking-widest mb-2"><i className="ph ph-stack mr-1"></i>BATCH PROCESSING</span>

                    {!streamingText && processingSeconds > 10 && processingSeconds <= 30 && <span className="text-[11px] text-slate-400 mt-3">{lang === 'fr' ? 'Gemini traite votre requête...' : 'Gemini is processing...'}</span>}
                    {!streamingText && processingSeconds > 30 && processingSeconds <= 60 && <span className="text-[11px] text-amber-400/70 mt-3">{lang === 'fr' ? 'Image en cours de génération...' : 'Generating image...'}</span>}
                    {!streamingText && processingSeconds > 60 && <span className="text-[11px] text-amber-400 mt-3 animate-pulse">{lang === 'fr' ? 'Finalisation HD...' : 'Finalizing HD...'}</span>}
                    <button onClick={() => { cancelGeneration(); if (isBatchMode) setIsBatchMode(false); }} className="mt-6 px-6 py-2.5 bg-red-500/20 text-red-400 border border-red-500/30 rounded-xl font-black text-[10px] uppercase hover:bg-red-500/30 transition-all flex items-center gap-2">
                      <i className="ph ph-stop text-sm"></i> {isBatchMode ? (lang === 'fr' ? 'Arrêter Batch' : 'Stop Batch') : (lang === 'fr' ? 'Annuler' : 'Cancel')}

                    <div className="flex items-center gap-2 mb-2">

                      <span className="text-[8px] font-black text-amber-400 uppercase tracking-widest">{lang === 'fr' ? 'Prompt Généré' : 'Generated Prompt'}</span>
                    </div>
                    <p className="text-[11px] text-slate-300 font-mono select-all pr-16 leading-relaxed max-h-[120px] overflow-y-auto custom-scrollbar">{promptResult}</p>
                    <div className="absolute top-4 right-4 flex items-center gap-1">

                    </div>
                  </div>
                )}

                      <div className="flex gap-2 pb-3 mb-2 overflow-x-auto custom-scrollbar border-b border-white/5">

                        ))}
                      </div>
                    )}

                    <div className="flex gap-2 overflow-x-auto pb-3 custom-scrollbar mb-1">
                      {QUICK_TAGS[lang].map(tag => {
                        const on = instruction.includes(tag);
                        return (
                          <button key={tag} onClick={() => { if (!on) setInstruction(p => p + (p && !p.endsWith(' ') ? ', ' : '') + tag); }} className={`whitespace-nowrap px-3 py-1.5 rounded-full border text-[9px] font-bold uppercase tracking-tighter transition-all ${on ? 'border-amber-400/20 text-amber-400/50 cursor-default bg-amber-400/5' : 'border-white/10 text-slate-500 hover:text-amber-400 hover:border-amber-400/40 hover:bg-amber-400/10'}`}>
                            # {tag}
                          </button>
                        );
                      })}
                    </div>

                    <textarea value={instruction} onChange={(e) => { setInstruction(e.target.value); setPromptHistoryIdx(-1); }}
                      onKeyDown={(e) => {
                        // Ctrl+Enter or Cmd+Enter → submit

                          e.preventDefault();
                          runAction('edit');
                        } else if (e.key === 'ArrowUp' && promptHistory.length > 0) {
                          e.preventDefault();
                          const next = Math.min(promptHistoryIdx + 1, promptHistory.length - 1);
                          setPromptHistoryIdx(next);
                          setInstruction(promptHistory[next]);

                          e.preventDefault();
                          const next = promptHistoryIdx - 1;
                          setPromptHistoryIdx(next);
                          setInstruction(next >= 0 ? promptHistory[next] : '');
                        }

                          </button>
                        )}
                      </div>
                      <div className="flex items-center gap-3">
                        {instruction && (
                          <button onClick={() => { setInstruction(''); setNegativePrompt(''); }} className="has-tooltip relative text-[10px] font-bold uppercase text-slate-500 hover:text-white px-2 py-2">
                            Clear<div className="tooltip tooltip-top">{t.tooltips.clear}</div>
                          </button>
                        )}
                        {imageResult && (
                          <button onClick={() => saveImageWithMeta(imageResult)} className="has-tooltip relative px-5 py-2.5 bg-white/5 text-slate-300 border border-white/10 rounded-xl text-[10px] font-bold uppercase hover:bg-white/10 hover:text-white transition-all flex items-center gap-2">
                            <i className="ph ph-download-simple text-sm"></i> Save
                            <div className="tooltip tooltip-top">{t.tooltips.save} (Ctrl+S)</div>
                          </button>
                        )}
                        {/* Cancel button */}
                        {status === 'processing' && (
                          <button onClick={cancelGeneration} className="px-5 py-3 bg-red-500/20 text-red-400 border border-red-500/30 rounded-xl font-black text-[10px] uppercase hover:bg-red-500/30 transition-all flex items-center gap-2">
                            <i className="ph ph-stop text-sm"></i> {lang === 'fr' ? 'Annuler' : 'Cancel'}
                          </button>
                        )}
                        <button onClick={() => runAction('edit')} disabled={status === 'processing' || (!instruction.trim() && !activeAction && !activeMatrixTags.length && selectedImageIndex === null && !imageResult)} className="has-tooltip relative px-8 py-3 bg-amber-400 text-black rounded-xl font-black text-[10px] uppercase shadow-[0_0_20px_rgba(251,191,36,0.3)] hover:scale-105 disabled:opacity-50 disabled:hover:scale-100 transition-all flex items-center gap-2">
                          <i className="ph ph-magic-wand text-sm"></i> {t.generate}
                          <div className="tooltip tooltip-top">{t.tooltips.process}</div>
                        </button>
                        {(activeTab === 'composer' || instruction.trim()) && (
                          <button onClick={() => runAction('prompt')} disabled={status === 'processing' || !instruction.trim()} className="has-tooltip relative px-5 py-3 bg-white/5 border border-white/10 text-slate-300 rounded-xl font-bold text-[10px] uppercase hover:bg-white/10 hover:text-white disabled:opacity-50 transition-all flex items-center gap-2">
                            <i className="ph ph-note-pencil text-sm"></i> {t.build}
                            <div className="tooltip tooltip-top">{lang === 'fr' ? 'L\'IA enrichit votre prompt en un texte optimisé pour la génération' : 'AI enriches your prompt into an optimized generation text'}</div>
                          </button>
                        )}
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </section>
          </main>

          {/* Modal résultat */}
          {showModal && modalImage && (
            <div className="fixed inset-0 z-[1000] bg-[#09090b]/80 backdrop-blur-xl flex items-center justify-center animate-in p-6">
              <div className="bg-[#121214] border border-white/10 rounded-3xl shadow-[0_20px_60px_rgba(0,0,0,0.8)] flex flex-col max-w-5xl w-full max-h-full overflow-hidden">
                <div className="flex items-center justify-between p-5 border-b border-white/5 bg-black/20">
                  <h3 className="text-white font-black tracking-widest text-[11px] uppercase flex items-center gap-2">
                    <i className="ph-fill ph-sparkle text-amber-400 text-base"></i> {lang === 'fr' ? 'Rendu Terminé' : 'Render Complete'}
                  </h3>
                  <div className="flex items-center gap-2">
                    {/* Full Analyze */}
                    <button onClick={() => { setShowModal(false); describeImage(modalImage); }} className="has-tooltip relative text-slate-500 hover:text-purple-400 transition-colors p-2">
                      <i className="ph ph-eye text-lg"></i>
                      <div className="tooltip tooltip-bottom">{lang === 'fr' ? 'Analyse complète' : 'Full analysis'}</div>
                    </button>
                    {/* Reverse Prompt button */}
                    <button onClick={() => { setShowModal(false); reversePrompt(modalImage); }} className="has-tooltip relative text-slate-500 hover:text-amber-400 transition-colors p-2">
                      <i className="ph ph-scan text-lg"></i>
                      <div className="tooltip tooltip-bottom">{lang === 'fr' ? 'Extraire le prompt' : 'Reverse prompt'}</div>
                    </button>
                    <button onClick={() => setShowModal(false)} className="text-slate-500 hover:text-white transition-colors">
                      <i className="ph ph-x text-xl"></i>
                    </button>
                  </div>
                </div>
                <div className="flex-1 overflow-hidden p-6 flex items-center justify-center bg-[radial-gradient(circle,rgba(255,255,255,0.03)_1px,transparent_1px)]" style={{ backgroundSize: '20px 20px' }}>
                  <img src={modalImage} className="max-w-full max-h-[60vh] object-contain rounded-xl shadow-2xl ring-1 ring-white/10" draggable="false" />
                </div>
                <div className="p-5 border-t border-white/5 flex items-center justify-between bg-black/40">
                  <button onClick={() => setShowModal(false)} className="text-[10px] font-bold uppercase tracking-widest text-slate-500 hover:text-red-400 transition-colors px-4 py-2">
                    {lang === 'fr' ? 'Annuler' : 'Discard'}
                  </button>
                  <div className="flex items-center gap-3">
                    <button onClick={() => saveImageWithMeta(modalImage)} className="px-5 py-3 bg-white/5 border border-white/10 rounded-xl text-[10px] font-bold uppercase tracking-widest text-slate-300 hover:bg-white/10 hover:text-white transition-all flex items-center gap-2">
                      <i className="ph ph-download-simple text-base"></i> {lang === 'fr' ? 'Télécharger' : 'Download'}
                    </button>
                    {/* Apply & Continue Editing — sets up iterative chain */}
                    <button onClick={async () => {
                      setImageResult(modalImage);
                      setIterativeMode(true);
                      setShowModal(false);
                      setActiveTab('studio');
                      setInstruction('');
                      setIsConsoleExpanded(true);
                      // Cache the base64 for immediate reuse
                      try {
                        const resp = await fetch(modalImage);
                        const blob = await resp.blob();
                        const reader = new FileReader();
                        const b64 = await new Promise(r => { reader.onload = () => r(reader.result.split(',')[1]); reader.readAsDataURL(blob); });
                        setIterativeSource(b64);
                      } catch(e) {}
                      showToast(lang === 'fr' ? 'MODE ITÉRATIF — ÉCRIVEZ LA PROCHAINE INSTRUCTION' : 'ITERATIVE MODE — TYPE YOUR NEXT EDIT');
                    }} className="px-5 py-3 bg-purple-500/20 text-purple-300 border border-purple-500/30 rounded-xl text-[10px] font-bold uppercase tracking-widest hover:bg-purple-500/30 transition-all flex items-center gap-2">
                      <i className="ph ph-arrows-clockwise text-base"></i> {lang === 'fr' ? 'Continuer Édition' : 'Continue Editing'}
                    </button>
                    <button onClick={() => { setImageResult(modalImage); setIsSplitMode(!!images[selectedImageIndex]); setShowModal(false); setActiveTab('studio'); }} className="px-6 py-3 bg-amber-400 text-black rounded-xl text-[10px] font-black uppercase tracking-widest hover:scale-105 shadow-[0_0_20px_rgba(251,191,36,0.3)] transition-all flex items-center gap-2">
                      <i className="ph-fill ph-check-circle text-base"></i> {lang === 'fr' ? 'Appliquer' : 'Apply'}
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* end result modal */}

          {/* Gallery modal */}
          {showGallery && galleryResults.length > 0 && (
            <div className="fixed inset-0 z-[1000] bg-[#09090b]/80 backdrop-blur-xl flex items-center justify-center animate-in p-6">
              <div className="bg-[#121214] border border-white/10 rounded-3xl shadow-[0_20px_60px_rgba(0,0,0,0.8)] flex flex-col max-w-5xl w-full max-h-[85vh] overflow-hidden">
                <div className="flex items-center justify-between p-5 border-b border-white/5 bg-black/20">
                  <h3 className="text-white font-black tracking-widest text-[11px] uppercase flex items-center gap-2">
                    <i className="ph ph-squares-four text-amber-400 text-base"></i> {lang === 'fr' ? 'Galerie de Session' : 'Session Gallery'}
                    <span className="text-[9px] font-mono text-slate-500 ml-2">{galleryResults.length} {lang === 'fr' ? 'résultats' : 'results'}</span>
                  </h3>
                  <button onClick={() => setShowGallery(false)} className="text-slate-500 hover:text-white transition-colors"><i className="ph ph-x text-xl"></i></button>
                </div>
                <div className="flex-1 overflow-y-auto p-6 custom-scrollbar">
                  <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
                    {galleryResults.map((item) => (
                      <div key={item.id} className="group relative aspect-square rounded-xl overflow-hidden border border-white/10 hover:border-amber-400/50 transition-all cursor-pointer bg-black/30">
                        <img src={item.url || item.thumb} className="w-full h-full object-cover" draggable="false" />
                        <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex flex-col justify-end p-3">
                          <p className="text-[9px] text-white font-bold truncate">{item.prompt}</p>
                          <p className="text-[7px] text-slate-400 font-mono mt-0.5">{item.time}</p>
                          <div className="flex gap-2 mt-2">
                            <button onClick={() => { setImageResult(item.url); setIsSplitMode(true); setShowGallery(false); setActiveTab('studio'); }} className="flex-1 py-1.5 bg-amber-400 text-black rounded-lg text-[8px] font-black uppercase text-center">Apply</button>
                            <button onClick={() => { setImageResult(item.url); setIterativeMode(true); setShowGallery(false); setActiveTab('studio'); setInstruction(''); }} className="flex-1 py-1.5 bg-purple-500/30 text-purple-300 rounded-lg text-[8px] font-bold uppercase text-center">Edit</button>
                            <button onClick={() => { reversePrompt(item.url); setShowGallery(false); }} className="py-1.5 px-2 bg-white/10 text-white rounded-lg text-[8px] font-bold"><i className="ph ph-scan"></i></button>
                            <button onClick={() => saveImageWithMeta(item.url)} className="py-1.5 px-2 bg-white/10 text-white rounded-lg text-[8px] font-bold"><i className="ph ph-download-simple"></i></button>
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
